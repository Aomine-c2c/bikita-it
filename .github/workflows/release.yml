name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/web/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api

      - name: Build API sidecar
        run: npm run build
        working-directory: apps/api

      - name: Package API sidecar
        run: |
          npm i -g @vercel/ncc
          ncc build dist/main.js -o sidecar
          npm i -g pkg
          pkg sidecar/index.js --target node18-win-x64 --output ../web/src-tauri/api-server-x86_64-pc-windows-msvc.exe
        working-directory: apps/api

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/web
          tagName: ${{ github.ref_name }}
          releaseName: 'Xiphos ${{ github.ref_name }}'
          releaseBody: |
            See the [CHANGELOG](https://github.com/Aomine-c2c/bikita-it/blob/main/CHANGELOG.md) for details.

            ### Installation
            Download and run `Xiphos_${{ github.ref_name }}_x64-setup.exe` to install.
            Existing installations will auto-update within the hour.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
