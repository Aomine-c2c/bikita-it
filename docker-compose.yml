version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: xiphos
      POSTGRES_PASSWORD: xiphos_password
      POSTGRES_DB: xiphos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
